name: Linux AppImage

on:
  workflow_dispatch:
  push:
    branches:
      - linux-v2
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: linux-sync-build
  cancel-in-progress: false

env:
  UPSTREAM_REPO: SnosMe/awakened-poe-trade
  UPSTREAM_BRANCH: master
  PATCH_BRANCH: linux-v2

jobs:
  sync-master:
    # Only sync upstream on cron/dispatch — push to linux-v2 skips this
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_build: ${{ steps.sync.outputs.should_build }}
    steps:
      - name: Checkout fork master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream and patch branch
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch origin master ${{ env.PATCH_BRANCH }}
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}

      - name: Sync fork master to upstream
        id: sync
        run: |
          set -euo pipefail

          git checkout master
          UPSTREAM_SHA=$(git rev-parse "upstream/${UPSTREAM_BRANCH}")

          SHOULD_BUILD=false
          if ! git merge-base --is-ancestor "$UPSTREAM_SHA" origin/master; then
            git merge --no-edit "$UPSTREAM_SHA"
            git push origin HEAD:master
            SHOULD_BUILD=true
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_BUILD=true
          fi

          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

  # Build from cron/dispatch: merge linux-v2 onto synced master
  build-from-sync:
    needs: sync-master
    if: needs.sync-master.outputs.should_build == 'true'
    uses: ./.github/workflows/linux-appimage-build.yml
    secrets: inherit
    with:
      checkout_ref: master

  # Build from push to linux-v2: merge onto current master and release
  build-from-push:
    if: github.event_name == 'push'
    uses: ./.github/workflows/linux-appimage-build.yml
    secrets: inherit
    with:
      checkout_ref: linux-v2
