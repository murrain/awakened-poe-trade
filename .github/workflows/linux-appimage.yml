name: Linux AppImage

on:
  workflow_dispatch:
  push:
    branches:
      - master
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: linux-sync-build
  cancel-in-progress: false

env:
  UPSTREAM_REPO: SnosMe/awakened-poe-trade
  UPSTREAM_BRANCH: master
  # Keep these fork-owned files when syncing upstream into master.
  # They intentionally diverge from upstream and would otherwise block sync.
  SYNC_OWNED_FILES: >-
    .github/workflows/linux-appimage.yml
    .github/workflows/linux-appimage-build.yml
    main/electron-builder.yml

jobs:
  sync-master:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_build: ${{ steps.sync.outputs.should_build }}
    steps:
      - name: Checkout fork master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream master
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch origin master
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}

      - name: Sync fork master to upstream
        id: sync
        run: |
          set -euo pipefail

          git checkout master
          UPSTREAM_SHA=$(git rev-parse "upstream/${UPSTREAM_BRANCH}")

          SHOULD_BUILD=false
          PUSHED_UPDATE=false

          if ! git merge-base --is-ancestor "$UPSTREAM_SHA" origin/master; then
            git merge --no-commit --no-ff "$UPSTREAM_SHA" || true

            # Keep fork-owned workflow and Linux packaging metadata on master.
            git checkout origin/master -- ${{ env.SYNC_OWNED_FILES }}
            git add ${{ env.SYNC_OWNED_FILES }}

            UNRESOLVED=$(git diff --name-only --diff-filter=U)
            if [ -n "$UNRESOLVED" ]; then
              echo "Unresolved upstream sync conflicts remain:"
              echo "$UNRESOLVED"
              exit 1
            fi

            git commit --no-edit
            git push origin HEAD:master
            PUSHED_UPDATE=true
          fi

          # Manual dispatch should build the current master only when the sync
          # step did not already push a fresh master commit that will trigger a
          # separate push-based release run.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$PUSHED_UPDATE" = false ]; then
            SHOULD_BUILD=true
          fi

          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

  build-from-dispatch:
    needs: sync-master
    if: github.event_name == 'workflow_dispatch' && needs.sync-master.outputs.should_build == 'true'
    uses: ./.github/workflows/linux-appimage-build.yml
    secrets: inherit
    with:
      checkout_ref: master

  build-from-push:
    if: github.event_name == 'push'
    uses: ./.github/workflows/linux-appimage-build.yml
    secrets: inherit
    with:
      checkout_ref: master
