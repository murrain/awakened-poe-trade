name: Linux AppImage

on:
  push:
    branches:
      - linux
      - linux-v2
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read app version
        id: version
        run: |
          echo "app_version=$(node -p \"require('./main/package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Build renderer
        run: |
          cd renderer
          npm ci --legacy-peer-deps
          npm run make-index-files
          npm run build

      - name: Build main
        run: |
          cd main
          npm ci
          npm run build

      - name: Package AppImage
        run: |
          cd main
          npx electron-builder build --linux AppImage -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ github.ref_name }}
          path: |
            main/dist/*.AppImage
            main/dist/latest-linux.yml
          retention-days: 7

      - name: Publish release with update metadata
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: |
          TAG="v${APP_VERSION}-linux"
          TITLE="Awakened PoE Trade ${APP_VERSION} (Linux)"
          NOTES="Branch build from ${GITHUB_REF_NAME} at ${GITHUB_SHA}."

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" main/dist/*.AppImage main/dist/latest-linux.yml --repo "${{ github.repository }}" --clobber
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest \
              main/dist/*.AppImage \
              main/dist/latest-linux.yml
          fi
