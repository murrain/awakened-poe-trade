name: Linux AppImage

on:
  workflow_dispatch:
  push:
    branches:
      - linux-v2
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: linux-sync-build
  cancel-in-progress: false

env:
  UPSTREAM_REPO: SnosMe/awakened-poe-trade
  UPSTREAM_BRANCH: master
  PATCH_BRANCH: linux-v2
  UPSTREAM_OWNED_FILES: >-
    main/package.json
    main/package-lock.json
    main/src/AppUpdater.ts

jobs:
  sync-master:
    # Only sync upstream on cron/dispatch — push to linux-v2 skips this
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_build: ${{ steps.sync.outputs.should_build }}
      upstream_sha: ${{ steps.sync.outputs.upstream_sha }}
    steps:
      - name: Checkout fork master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream and patch branch
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch origin master ${{ env.PATCH_BRANCH }}
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}

      - name: Sync fork master to upstream
        id: sync
        run: |
          set -euo pipefail

          git checkout master
          UPSTREAM_SHA=$(git rev-parse "upstream/${UPSTREAM_BRANCH}")
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"

          SHOULD_BUILD=false
          if ! git merge-base --is-ancestor "$UPSTREAM_SHA" origin/master; then
            git merge --no-edit "$UPSTREAM_SHA"
            git push origin HEAD:master
            SHOULD_BUILD=true
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_BUILD=true
          fi

          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

  # Build from cron/dispatch: merge linux-v2 onto synced master
  build-from-sync:
    needs: sync-master
    if: needs.sync-master.outputs.should_build == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout updated fork master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch patch branch
        run: |
          git fetch origin master ${{ env.PATCH_BRANCH }}

      - name: Merge linux changes onto synced master
        run: |
          set -euo pipefail
          git checkout -B build-linux origin/master
          git merge --no-edit "origin/${PATCH_BRANCH}"

      - name: Restore upstream-owned release metadata
        run: |
          set -euo pipefail
          # Linux packaging rewrites these files later in the job.
          # Keeping them sourced from master prevents linux-v2 metadata drift
          # from blocking the sync merge.
          git checkout origin/master -- ${{ env.UPSTREAM_OWNED_FILES }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute fork version and patch main package metadata
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BASE_VERSION=$(git show origin/master:main/package.json | node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync(0,'utf8')); process.stdout.write(pkg.version)")
          LATEST_TAG=$(gh release list --repo "${{ github.repository }}" --limit 100 --json tagName --jq 'map(select(.tagName | endswith("-linux")))[0].tagName // ""')

          export BASE_VERSION
          export LATEST_TAG
          FORK_VERSION=$(node <<'NODE'
          const base = (process.env.BASE_VERSION || '').trim()
          const latestTag = (process.env.LATEST_TAG || '').trim()

          const baseMatch = base.match(/^(\d+)\.(\d+)\.(\d+)$/)
          if (!baseMatch) throw new Error(`Unexpected upstream version: ${base}`)

          const [, major, minor, patch] = baseMatch
          let suffix = 1

          const latestMatch = latestTag.match(/^v?(\d+)\.(\d+)\.(\d+)-linux$/)
          if (latestMatch) {
            const [, latestMajor, latestMinor, latestPatch] = latestMatch
            if (
              latestMajor === major &&
              latestMinor === minor &&
              latestPatch.length > 3 &&
              latestPatch.slice(0, -3) === patch
            ) {
              suffix = Number(latestPatch.slice(-3)) + 1
            }
          }

          process.stdout.write(
            `${major}.${minor}.${patch}${String(suffix).padStart(3, '0')}`,
          )
          NODE
          )

          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "fork_version=$FORK_VERSION" >> "$GITHUB_OUTPUT"

          cd main
          npm version "$FORK_VERSION" --no-git-tag-version --allow-same-version
          npm pkg set repository.url="https://github.com/murrain/awakened-poe-trade.git"
          npm pkg set dependencies.electron-overlay-window="github:murrain/electron-overlay-window"

          node <<'NODE'
          const fs = require('fs')
          const path = 'src/AppUpdater.ts'
          const marker = "autoUpdater.setFeedURL({ provider: 'github', owner: 'murrain', repo: 'awakened-poe-trade' })"
          let text = fs.readFileSync(path, 'utf8')
          if (!text.includes(marker)) {
            text = text.replace(
              '// https://www.electron.build',
              `    ${marker}\n    // https://www.electron.build`,
            )
            fs.writeFileSync(path, text)
          }
          NODE

          npm install electron-overlay-window@github:murrain/electron-overlay-window --package-lock-only

      - name: Build renderer
        run: |
          cd renderer
          npm ci --legacy-peer-deps
          npm run make-index-files
          npm run build

      - name: Build main
        run: |
          cd main
          npm ci
          npm run build

      - name: Package AppImage
        run: |
          cd main
          npx electron-builder build --linux AppImage -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ steps.version.outputs.fork_version }}
          path: |
            main/dist/*.AppImage
            main/dist/latest-linux.yml
          retention-days: 7

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORK_VERSION: ${{ steps.version.outputs.fork_version }}
          BASE_VERSION: ${{ steps.version.outputs.base_version }}
          UPSTREAM_SHA: ${{ needs.sync-master.outputs.upstream_sha }}
        run: |
          set -euo pipefail

          TAG="v${FORK_VERSION}-linux"
          TITLE="Awakened PoE Trade v${FORK_VERSION} (Linux)"

          # Fetch upstream release notes for the base version
          UPSTREAM_BODY=""
          for TAG_CANDIDATE in "v${BASE_VERSION}" "${BASE_VERSION}"; do
            UPSTREAM_BODY=$(gh release view "$TAG_CANDIDATE" \
              --repo "${{ env.UPSTREAM_REPO }}" \
              --json body --jq '.body' 2>/dev/null || true)
            if [ -n "$UPSTREAM_BODY" ]; then break; fi
          done

          # Read Linux-specific notes from repo file, fall back to default
          LINUX_NOTES_FILE=".github/LINUX_RELEASE_NOTES.md"
          if [ -f "$LINUX_NOTES_FILE" ]; then
            LINUX_NOTES=$(cat "$LINUX_NOTES_FILE")
          else
            LINUX_NOTES="- Unofficial Linux AppImage build with overlay and focus fixes."
          fi

          NOTES_FILE=$(mktemp)
          {
            echo "Unofficial Linux build of [Awakened PoE Trade](https://github.com/SnosMe/awakened-poe-trade) with fixes for Linux."
            echo ""
            echo "## What's improved for Linux"
            echo ""
            echo "$LINUX_NOTES"
            if [ -n "$UPSTREAM_BODY" ]; then
              echo ""
              echo "---"
              echo ""
              echo "## What's new in upstream ${BASE_VERSION}"
              echo ""
              echo "$UPSTREAM_BODY"
            fi
          } > "$NOTES_FILE"

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" main/dist/*.AppImage main/dist/latest-linux.yml --repo "${{ github.repository }}" --clobber
            gh release edit "$TAG" --repo "${{ github.repository }}" --title "$TITLE" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest \
              main/dist/*.AppImage \
              main/dist/latest-linux.yml
          fi

          rm -f "$NOTES_FILE"

  # Build from push to linux-v2: merge onto current master and release
  build-from-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout linux-v2
        uses: actions/checkout@v4
        with:
          ref: linux-v2
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge linux-v2 onto master
        run: |
          set -euo pipefail
          git fetch origin master
          git checkout -B build-linux origin/master
          git merge --no-edit origin/linux-v2

      - name: Restore upstream-owned release metadata
        run: |
          set -euo pipefail
          # Linux packaging rewrites these files later in the job.
          # Keeping them sourced from master prevents linux-v2 metadata drift
          # from blocking the sync merge.
          git checkout origin/master -- ${{ env.UPSTREAM_OWNED_FILES }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute fork version and patch main package metadata
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BASE_VERSION=$(git show origin/master:main/package.json | node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync(0,'utf8')); process.stdout.write(pkg.version)")
          LATEST_TAG=$(gh release list --repo "${{ github.repository }}" --limit 100 --json tagName --jq 'map(select(.tagName | endswith("-linux")))[0].tagName // ""')

          export BASE_VERSION
          export LATEST_TAG
          FORK_VERSION=$(node <<'NODE'
          const base = (process.env.BASE_VERSION || '').trim()
          const latestTag = (process.env.LATEST_TAG || '').trim()

          const baseMatch = base.match(/^(\d+)\.(\d+)\.(\d+)$/)
          if (!baseMatch) throw new Error(`Unexpected upstream version: ${base}`)

          const [, major, minor, patch] = baseMatch
          let suffix = 1

          const latestMatch = latestTag.match(/^v?(\d+)\.(\d+)\.(\d+)-linux$/)
          if (latestMatch) {
            const [, latestMajor, latestMinor, latestPatch] = latestMatch
            if (
              latestMajor === major &&
              latestMinor === minor &&
              latestPatch.length > 3 &&
              latestPatch.slice(0, -3) === patch
            ) {
              suffix = Number(latestPatch.slice(-3)) + 1
            }
          }

          process.stdout.write(
            `${major}.${minor}.${patch}${String(suffix).padStart(3, '0')}`,
          )
          NODE
          )

          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "fork_version=$FORK_VERSION" >> "$GITHUB_OUTPUT"

          cd main
          npm version "$FORK_VERSION" --no-git-tag-version --allow-same-version
          npm pkg set repository.url="https://github.com/murrain/awakened-poe-trade.git"
          npm pkg set dependencies.electron-overlay-window="github:murrain/electron-overlay-window"

          node <<'NODE'
          const fs = require('fs')
          const path = 'src/AppUpdater.ts'
          const marker = "autoUpdater.setFeedURL({ provider: 'github', owner: 'murrain', repo: 'awakened-poe-trade' })"
          let text = fs.readFileSync(path, 'utf8')
          if (!text.includes(marker)) {
            text = text.replace(
              '// https://www.electron.build',
              `    ${marker}\n    // https://www.electron.build`,
            )
            fs.writeFileSync(path, text)
          }
          NODE

          npm install electron-overlay-window@github:murrain/electron-overlay-window --package-lock-only

      - name: Build renderer
        run: |
          cd renderer
          npm ci --legacy-peer-deps
          npm run make-index-files
          npm run build

      - name: Build main
        run: |
          cd main
          npm ci
          npm run build

      - name: Package AppImage
        run: |
          cd main
          npx electron-builder build --linux AppImage -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ steps.version.outputs.fork_version }}
          path: |
            main/dist/*.AppImage
            main/dist/latest-linux.yml
          retention-days: 7

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORK_VERSION: ${{ steps.version.outputs.fork_version }}
          BASE_VERSION: ${{ steps.version.outputs.base_version }}
        run: |
          set -euo pipefail

          TAG="v${FORK_VERSION}-linux"
          TITLE="Awakened PoE Trade v${FORK_VERSION} (Linux)"

          # Fetch upstream release notes for the base version
          UPSTREAM_BODY=""
          for TAG_CANDIDATE in "v${BASE_VERSION}" "${BASE_VERSION}"; do
            UPSTREAM_BODY=$(gh release view "$TAG_CANDIDATE" \
              --repo "${{ env.UPSTREAM_REPO }}" \
              --json body --jq '.body' 2>/dev/null || true)
            if [ -n "$UPSTREAM_BODY" ]; then break; fi
          done

          # Read Linux-specific notes from repo file, fall back to default
          LINUX_NOTES_FILE=".github/LINUX_RELEASE_NOTES.md"
          if [ -f "$LINUX_NOTES_FILE" ]; then
            LINUX_NOTES=$(cat "$LINUX_NOTES_FILE")
          else
            LINUX_NOTES="- Unofficial Linux AppImage build with overlay and focus fixes."
          fi

          NOTES_FILE=$(mktemp)
          {
            echo "Unofficial Linux build of [Awakened PoE Trade](https://github.com/SnosMe/awakened-poe-trade) with fixes for Linux."
            echo ""
            echo "## What's improved for Linux"
            echo ""
            echo "$LINUX_NOTES"
            if [ -n "$UPSTREAM_BODY" ]; then
              echo ""
              echo "---"
              echo ""
              echo "## What's new in upstream ${BASE_VERSION}"
              echo ""
