name: Linux AppImage Build

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Ref to check out before packaging the Linux fork release
        required: true
        type: string

env:
  UPSTREAM_REPO: SnosMe/awakened-poe-trade
  FORK_IDENTIFIER: murrain

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute fork version and patch main package metadata
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          UPSTREAM_RELEASE_TAG=$(gh release list --repo "${{ env.UPSTREAM_REPO }}" --limit 1 --json tagName --jq '.[0].tagName // ""')
          RELEASE_TAGS=$(gh release list --repo "${{ github.repository }}" --limit 100 --json tagName --jq '.[].tagName')

          export UPSTREAM_RELEASE_TAG
          export RELEASE_TAGS
          export FORK_IDENTIFIER
          BASE_VERSION=$(node <<'NODE'
          const upstreamTag = (process.env.UPSTREAM_RELEASE_TAG || '').trim()
          const match = upstreamTag.match(/^v?(\d+\.\d+\.\d+)$/)
          if (!match) throw new Error(`Unexpected upstream release tag: ${upstreamTag}`)
          process.stdout.write(match[1])
          NODE
          )

          export BASE_VERSION
          FORK_VERSION=$(node <<'NODE'
          const base = (process.env.BASE_VERSION || '').trim()
          const fork = (process.env.FORK_IDENTIFIER || '').trim()
          const tags = (process.env.RELEASE_TAGS || '')
            .split('\n')
            .map(tag => tag.trim())
            .filter(Boolean)

          const baseMatch = base.match(/^(\d+)\.(\d+)\.(\d+)$/)
          if (!baseMatch) throw new Error(`Unexpected upstream version: ${base}`)
          if (!fork) throw new Error('Missing FORK_IDENTIFIER')

          let suffix = 1
          const escapedBase = base.replaceAll('.', '\\.')
          const escapedFork = fork.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
          const tagPattern = new RegExp(`^v?${escapedBase}(\\d{3})-${escapedFork}$`)

          for (const tag of tags) {
            const match = tag.match(tagPattern)
            if (!match) continue
            suffix = Math.max(suffix, Number(match[1]) + 1)
          }

          process.stdout.write(`${base}${String(suffix).padStart(3, '0')}`)
          NODE
          )

          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "fork_version=$FORK_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${FORK_VERSION}-${FORK_IDENTIFIER}" >> "$GITHUB_OUTPUT"

          cd main
          npm version "$FORK_VERSION" --no-git-tag-version --allow-same-version
          npm pkg set repository.url="https://github.com/${{ github.repository }}.git"
          npm pkg set dependencies.electron-overlay-window="github:murrain/electron-overlay-window"

          export REPOSITORY_OWNER="${{ github.repository_owner }}"
          export REPOSITORY_NAME="${{ github.event.repository.name }}"
          node <<'NODE'
          const fs = require('fs')
          const path = 'src/AppUpdater.ts'
          const owner = process.env.REPOSITORY_OWNER
          const repo = process.env.REPOSITORY_NAME
          const marker = `autoUpdater.setFeedURL({ provider: 'github', owner: '${owner}', repo: '${repo}' })`
          let text = fs.readFileSync(path, 'utf8')
          if (!text.includes(marker)) {
            text = text.replace(
              '// https://www.electron.build',
              `    ${marker}\n    // https://www.electron.build`,
            )
            fs.writeFileSync(path, text)
          }
          NODE

          npm install electron-overlay-window@github:murrain/electron-overlay-window --package-lock-only

      - name: Build renderer
        run: |
          cd renderer
          npm ci --legacy-peer-deps
          npm run make-index-files
          npm run build

      - name: Build main
        run: |
          cd main
          npm ci
          npm run build

      - name: Package AppImage
        run: |
          cd main
          npx electron-builder build --linux AppImage -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ steps.version.outputs.fork_version }}
          path: |
            main/dist/*.AppImage
            main/dist/latest-linux.yml
          retention-days: 7

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          FORK_VERSION: ${{ steps.version.outputs.fork_version }}
          BASE_VERSION: ${{ steps.version.outputs.base_version }}
        run: |
          set -euo pipefail

          TITLE="Awakened PoE Trade ${FORK_VERSION} (Linux)"

          # Fetch upstream release notes for the base version
          UPSTREAM_BODY=""
          for TAG_CANDIDATE in "v${BASE_VERSION}" "${BASE_VERSION}"; do
            UPSTREAM_BODY=$(gh release view "$TAG_CANDIDATE" \
              --repo "${{ env.UPSTREAM_REPO }}" \
              --json body --jq '.body' 2>/dev/null || true)
            if [ -n "$UPSTREAM_BODY" ]; then break; fi
          done

          # Read Linux-specific notes from repo file, fall back to default
          LINUX_NOTES_FILE=".github/LINUX_RELEASE_NOTES.md"
          if [ -f "$LINUX_NOTES_FILE" ]; then
            LINUX_NOTES=$(cat "$LINUX_NOTES_FILE")
          else
            LINUX_NOTES="- Unofficial Linux AppImage build with overlay and focus fixes."
          fi

          NOTES_FILE=$(mktemp)
          {
            echo "Unofficial Linux build of [Awakened PoE Trade](https://github.com/SnosMe/awakened-poe-trade) with fixes for Linux."
            echo ""
            echo "## What's improved for Linux"
            echo ""
            echo "$LINUX_NOTES"
            if [ -n "$UPSTREAM_BODY" ]; then
              echo ""
              echo "---"
              echo ""
              echo "## What's new in upstream ${BASE_VERSION}"
              echo ""
              echo "$UPSTREAM_BODY"
            fi
          } > "$NOTES_FILE"

          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" main/dist/*.AppImage main/dist/latest-linux.yml --repo "${{ github.repository }}" --clobber
            gh release edit "$RELEASE_TAG" --repo "${{ github.repository }}" --title "$TITLE" --notes-file "$NOTES_FILE"
          else
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest \
              main/dist/*.AppImage \
              main/dist/latest-linux.yml
          fi

          rm -f "$NOTES_FILE"
