name: Build

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - README.md

jobs:
  renderer:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
    - run: npm ci
      working-directory: ./renderer
    - run: npm run make-index-files
      working-directory: ./renderer
    - run: npm run lint
      working-directory: ./renderer
    - run: npm run build
      working-directory: ./renderer
    - uses: actions/upload-artifact@v4
      with:
        name: renderer-dist
        path: ./renderer/dist
        retention-days: 1

  release-notes-preview:
    if: github.base_ref == 'master'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
    - name: Generate and post release notes preview
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPSTREAM_REPO: SnosMe/awakened-poe-trade
      run: |
        set -euo pipefail

        UPSTREAM_RELEASE_TAG=$(gh release list --repo "$UPSTREAM_REPO" --limit 1 --json tagName --jq '.[0].tagName // ""')
        export UPSTREAM_RELEASE_TAG
        BASE_VERSION=$(node <<'NODE'
        const tag = (process.env.UPSTREAM_RELEASE_TAG || '').trim()
        const match = tag.match(/^v?(\d+\.\d+\.\d+)$/)
        if (!match) throw new Error(`Unexpected upstream release tag: ${tag}`)
        process.stdout.write(match[1])
        NODE
        )

        UPSTREAM_BODY=""
        for TAG_CANDIDATE in "v${BASE_VERSION}" "${BASE_VERSION}"; do
          UPSTREAM_BODY=$(gh release view "$TAG_CANDIDATE" \
            --repo "$UPSTREAM_REPO" \
            --json body --jq '.body' 2>/dev/null || true)
          if [ -n "$UPSTREAM_BODY" ]; then break; fi
        done

        LINUX_NOTES_FILE=".github/LINUX_RELEASE_NOTES.md"
        if [ -f "$LINUX_NOTES_FILE" ]; then
          LINUX_NOTES=$(cat "$LINUX_NOTES_FILE")
        else
          LINUX_NOTES="- Unofficial Linux AppImage build with overlay and focus fixes."
        fi

        COMMENT_BODY=$(mktemp)
        {
          echo "### 📋 Release Notes Preview"
          echo ""
          echo "Unofficial Linux build of [Awakened PoE Trade](https://github.com/SnosMe/awakened-poe-trade) with fixes for Linux."
          echo ""
          echo "## What's improved for Linux"
          echo ""
          echo "$LINUX_NOTES"
          if [ -n "$UPSTREAM_BODY" ]; then
            echo ""
            echo "---"
            echo ""
            echo "## What's new in upstream ${BASE_VERSION}"
            echo ""
            echo "$UPSTREAM_BODY"
          fi
        } > "$COMMENT_BODY"

        # Update or create the preview comment
        EXISTING=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
          --jq '.[] | select(.body | startswith("### 📋 Release Notes Preview")) | .id' 2>/dev/null | head -1)

        if [ -n "$EXISTING" ]; then
          gh api "repos/${{ github.repository }}/issues/comments/$EXISTING" \
            -X PATCH -F "body=@$COMMENT_BODY"
        else
          gh pr comment "${{ github.event.pull_request.number }}" --body-file "$COMMENT_BODY"
        fi

        rm -f "$COMMENT_BODY"

  package:
    needs: renderer
    strategy:
      matrix:
        os: [windows-2022, ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
    - uses: actions/download-artifact@v4
      with:
        name: renderer-dist
        path: ./renderer/dist
    - run: npm ci
      working-directory: ./main
    - run: npm run build
      working-directory: ./main
    - run: npm run package "--" -p onTagOrDraft
      working-directory: ./main
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Hash
      if: ${{ startsWith(matrix.os, 'windows') }}
      run: type .\main\dist\latest.yml
    - name: Hash
      if: ${{ startsWith(matrix.os, 'ubuntu') }}
      run: cat ./main/dist/latest-linux.yml
    - name: Hash
      if: ${{ startsWith(matrix.os, 'macos') }}
      run: cat ./main/dist/latest-mac.yml
