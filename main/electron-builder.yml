publish:
  - "github"
productName: "Awakened PoE Trade"
npmRebuild: false
files:
  - "package.json"
  - from: "dist"
    to: "."
    filter: ["main.js", "vision.js"]
  - from: "../renderer/dist"
    to: "."
  - from: "node_modules/uiohook-napi"
    to: "node_modules/uiohook-napi"
  - from: "node_modules/electron-overlay-window"
    to: "node_modules/electron-overlay-window"
  - from: "node_modules/node-gyp-build"
    to: "node_modules/node-gyp-build"
  - from: "node_modules/throttle-debounce"
    to: "node_modules/throttle-debounce"
extraMetadata:
  main: "main.js"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
win:
  target:
    - "nsis"
    - "portable"
linux:
  artifactName: "Awakened.PoE.Trade-${version}-murrain.${ext}"
  target:
    - "AppImage"
mac:
  target:
    - target: "dmg"
      arch:
        - "universal"
  identity: null
  x64ArchFiles: "*"
appImage:
  executableArgs:
    - "--sandbox"
